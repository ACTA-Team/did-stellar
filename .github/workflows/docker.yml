name: Docker

# Publishes the did:stellar resolver as a public container image.
#
# The DIF Universal Resolver does not consume a hosted URL — it pulls an
# image and runs it inside its own cluster, so the driver has to exist on
# a public registry with an explicit version tag (`:latest` is disallowed
# by the driver rules). GHCR is used rather than Docker Hub to avoid the
# anonymous-pull rate limits the Universal Resolver docs warn about.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. 0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    name: Build and push driver-did-stellar
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Release tags arrive as `v0.1.0`; the image tag drops the `v` so it
      # matches the version in packages/api/package.json. The owner is
      # lowercased because GHCR rejects uppercase in an image reference
      # (github.repository_owner is `ACTA-Team`).
      - name: Resolve image name and tag
        id: meta
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          image="ghcr.io/${owner}/driver-did-stellar"
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${GITHUB_REF_NAME#v}"
          else
            tag="${{ inputs.tag }}"
          fi
          if [ -z "$tag" ]; then
            echo "::error::could not resolve an image tag"
            exit 1
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Publishing ${image}:${tag}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Context is the repo root: the Dockerfile COPYs pnpm-workspace.yaml
      # and packages/ from the workspace root. Root .dockerignore applies.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # The Universal Resolver CI resolves the configured testIdentifiers
      # against the published image — fail here rather than in their PR.
      - name: Smoke-test the published image
        run: |
          docker run -d --name driver -p 8080:8080 \
            "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}"
          for i in $(seq 1 30); do
            curl -fsS http://localhost:8080/health >/dev/null 2>&1 && break
            sleep 2
          done
          curl -fsS http://localhost:8080/health | tee /dev/stderr | grep -q '"status":"ok"'
          curl -fsS -H 'Accept: application/ld+json' \
            "http://localhost:8080/1.0/identifiers/did:stellar:testnet:znfxngsh46vkyqu6inrx4omphi" \
            | tee /dev/stderr | grep -q '"didDocument"'
          docker rm -f driver
